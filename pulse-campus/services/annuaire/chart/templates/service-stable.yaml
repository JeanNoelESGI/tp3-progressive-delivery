{{- /*
  service-stable.yaml — Service "Stable" pour le trafic Argo Rollouts.

  Ce Service est référencé par le Rollout comme `stableService`.
  Argo Rollouts gère son sélecteur automatiquement :
    - Pendant un rollout : sélectionne les pods avec le hash de la révision STABLE
      (label rollouts-pod-template-hash = <hash-stable>).
    - Après promotion : sélectionne tous les pods (nouvelle révision stable).

  Le sélecteur initial pointe sur tous les pods via selectorLabels.
  Argo Rollouts le surcharge dynamiquement avec rollouts-pod-template-hash.

  FILTRAGE MÉTRIQUES (cf. RAPPORT.md étape 1) :
    La métrique http_requests_total exposée par les pods portera le label
    rollouts_pod_template_hash (underscores en Prometheus vs tirets en K8s).
    Les AnalysisTemplate (étape 7) filtreront :
      {job="annuaire", rollouts_pod_template_hash="<HASH_STABLE>"}
*/ -}}
{{- if not .Values.useDeployment }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "annuaire.fullname" . }}-stable
  labels:
    {{- include "annuaire.labels" . | nindent 4 }}
    app.kubernetes.io/component: stable
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "annuaire.selectorLabels" . | nindent 4 }}
{{- end }}
