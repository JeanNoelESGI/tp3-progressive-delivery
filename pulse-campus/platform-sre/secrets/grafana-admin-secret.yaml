# =============================================================================
# grafana-admin-secret.yaml
#
# ⚠️  CE FICHIER NE DOIT PAS ÊTRE COMMITÉ DANS GIT EN L'ÉTAT.
#    La valeur `password` est encodée en base64 mais n'est PAS chiffrée.
#
# OPTIONS POUR LA PRODUCTION :
#   1. Sealed Secrets (kubeseal) : chiffre le Secret avec la clé publique du cluster
#   2. External Secrets Operator : tire le secret depuis Vault / AWS SM / GCP SM
#   3. ArgoCD Vault Plugin : injection au moment de la sync
#
# POUR LE TP (cluster Kind local) :
#   Créez le Secret manuellement AVANT la première sync ArgoCD :
#
#   kubectl create namespace monitoring
#   kubectl create secret generic grafana-admin-secret \
#     --namespace monitoring \
#     --from-literal=admin-user=admin \
#     --from-literal=admin-password='Esgi@2026SRE!'
#
#   OU appliquez ce fichier après avoir remplacé les valeurs base64 :
#   echo -n 'admin'         | base64  → YWRtaW4=
#   echo -n 'Esgi@2026SRE!' | base64  → RXNnaUAyMDI2U1JFIQo=  (vérifiez la vôtre)
#
#   kubectl apply -f platform-sre/secrets/grafana-admin-secret.yaml
#
# AJOUTEZ ce fichier à .gitignore si vous le remplissez avec de vraies valeurs.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: devhub-campus
    app.kubernetes.io/component: grafana-credentials
type: Opaque
# Les valeurs ci-dessous sont des PLACEHOLDERS.
# Remplacez-les par vos propres valeurs encodées en base64.
# echo -n 'admin'        | base64
# echo -n 'Esgi@2026SRE!' | base64
data:
  admin-user: YWRtaW4=              # base64("admin")
  admin-password: CHANGEME_BASE64   # à remplacer par: echo -n '<votre-mdp>' | base64
