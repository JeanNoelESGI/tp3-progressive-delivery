# Values du chart argo-rollouts.
# Référence : https://github.com/argoproj/argo-helm/tree/main/charts/argo-rollouts
#
# Étape 5 du poly.

# Active le dashboard Web et l'expose via ingress sur rollouts.devhub.local.
dashboard:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - rollouts.devhub.local
    paths:
      - /
    pathType: Prefix

# Active le service de notifications utilisé en étape 10.
notifications:
  secret:
    create: true
  configmap:
    create: true
    data:
      # Configurations des intégrations webhook
      service.webhook.webhook-primary: |
        url: https://webhook.site/placeholder-primary-rollouts-url
        headers:
          - name: Content-Type
            value: application/json
      service.webhook.webhook-product: |
        url: https://webhook.site/placeholder-product-rollouts-url
        headers:
          - name: Content-Type
            value: application/json

      # Templates de message JSON envoyés
      template.rollout-success: |
        webhook:
          webhook-product:
            method: POST
            body: |
              {
                "rollout": "{{.rollout.metadata.name}}",
                "conclusion": "Promoted",
                "phase": "{{.rollout.status.phase}}",
                "image": "{{(index .rollout.spec.template.spec.containers 0).image}}",
                "stable_revision": "{{.rollout.status.stableRS}}",
                "duration": "5 minutes (analysis + pauses)"
              }
      template.rollout-failure: |
        webhook:
          webhook-primary:
            method: POST
            body: |
              {
                "rollout": "{{.rollout.metadata.name}}",
                "conclusion": "Aborted",
                "phase": "{{.rollout.status.phase}}",
                "image": "{{(index .rollout.spec.template.spec.containers 0).image}}",
                "stable_revision": "{{.rollout.status.stableRS}}",
                "failed_revision": "{{.rollout.status.currentPodHash}}",
                "duration": "analysis failed (auto-rollback triggered)"
              }

      # Déclencheurs (triggers) basés sur le statut
      trigger.on-rollout-completed: |
        - send: [rollout-success]
          when: rollout.status.phase == "Healthy"
      trigger.on-rollout-aborted: |
        - send: [rollout-failure]
          when: rollout.status.phase == "Degraded"



# En kind, gardez les ressources légères.
controller:
  replicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false
